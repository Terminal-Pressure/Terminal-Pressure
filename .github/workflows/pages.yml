name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mkdocs mkdocs-material
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Build documentation
      run: |
        # Create a simple mkdocs config if it doesn't exist
        if [ ! -f mkdocs.yml ]; then
          echo "site_name: Terminal Pressure" > mkdocs.yml
          echo "theme: readthedocs" >> mkdocs.yml
          mkdir -p docs
          echo "# Terminal Pressure" > docs/index.md
          echo "Documentation placeholder" >> docs/index.md
        fi
        mkdocs build
    
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: github-pages
        path: site/
  
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
      if: false  # Disable actual deployment for pull requests
